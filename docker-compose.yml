version: "3.9"

services:
  # Database Service
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hardware_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hardware-net

  # Backend Service (Node.js + Python ML)
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: hardware-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hardware_db}
      - REMOTE_DATABASE_URL=${REMOTE_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-hardware_store_secret_key_2024}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - backend-backups:/app/backups
      - backend-uploads:/app/public/uploads
      - ml-data:/app/ml_service
    networks:
      - hardware-net

  # Frontend Service (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: hardware-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    restart: unless-stopped
    networks:
      - hardware-net

  # ML Service (Standalone training / monitoring)
  ml-service:
    build:
      context: .
      dockerfile: docker/ml-service/Dockerfile
    container_name: hardware-ml-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hardware_db}
      - REMOTE_DATABASE_URL=${REMOTE_DATABASE_URL}
    volumes:
      - ml-data:/app/ml_service
    networks:
      - hardware-net
    profiles:
      - ml  # Start with: docker compose --profile ml up
    restart: unless-stopped

  # Database Management UI
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    networks:
      - hardware-net

networks:
  hardware-net:
    driver: bridge

volumes:
  postgres-data:
  backend-backups:
  backend-uploads:
  ml-data:
