version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # This reads the Supabase DATABASE_URL from your .env file
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - app-data:/app/backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/ml-service/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - app-data:/app/backend
    environment:
      - DATABASE_URL=${DATABASE_URL}

volumes:
  app-data:
    # Optional: Electron app (existing)
