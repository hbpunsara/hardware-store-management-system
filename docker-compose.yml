version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Optional: set DATABASE_URL if using Postgres (e.g. from docker-compose.pg.yml)
      # - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/hardware_db

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  # Optional: Electron app (existing)
  # electron-app:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #   environment:
  #     - DISPLAY=:0
  #   volumes:
  #     - /tmp/.X11-unix:/tmp/.X11-unix
